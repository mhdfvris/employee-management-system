image: php:8.3-cli

stages: [test]

variables:
  APP_ENV: testing
  APP_DEBUG: "true"
  CACHE_DRIVER: array
  SESSION_DRIVER: array
  QUEUE_CONNECTION: sync

test:
  stage: test
  before_script:
    - apt-get update -y
    - apt-get install -y git unzip libzip-dev sqlite3 libsqlite3-dev
    - docker-php-ext-install zip pdo_sqlite
    - pecl install pcov
    - docker-php-ext-enable pcov
    - echo "pcov.enabled=1" > /usr/local/etc/php/conf.d/pcov.ini
    - php -m | grep -i -E "pcov|pdo_sqlite"

    - curl -sS https://getcomposer.org/installer | php
    - mv composer.phar /usr/local/bin/composer
    - composer install --no-interaction --prefer-dist

    - cp .env.example .env.testing
    - php artisan key:generate --env=testing

    - mkdir -p database storage/test-results
    - touch database/database.sqlite

  script:
    - export DB_CONNECTION=sqlite
    - export DB_DATABASE=$(pwd)/database/database.sqlite
    - php artisan migrate --env=testing --force
    - php -d pcov.enabled=1 artisan test --env=testing --coverage --log-junit storage/test-results/junit.xml

  artifacts:
    when: always
    reports:
      junit: storage/test-results/junit.xml
    paths:
      - storage/logs
      - storage/test-results
