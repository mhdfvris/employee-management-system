image: php:8.3

stages:
  - build
  - test

before_script:
  - apt-get update -y
  - apt-get install -y git unzip libzip-dev
  - docker-php-ext-install zip
  - pecl install pcov
  - docker-php-ext-enable pcov
  - echo "pcov.enabled=1" > /usr/local/etc/php/conf.d/pcov.ini
  - echo "pcov.directory=." >> /usr/local/etc/php/conf.d/pcov.ini
  - php -m | grep -i pcov
  - curl -sS https://getcomposer.org/installer | php
  - mv composer.phar /usr/local/bin/composer
  - composer install --no-interaction --prefer-dist
  - php artisan key:generate --env=testing

build:
  stage: build
  script:
    - echo "Build stage completed successfully"

tests:
  stage: test
  image: php:8.3-cli
  services:
    - name: postgres:16
      alias: postgres

  variables:
    DB_CONNECTION: pgsql
    DB_HOST: postgres
    DB_PORT: 5432
    DB_DATABASE: employee_task_tracker_test
    DB_USERNAME: postgres
    DB_PASSWORD: postgres

  before_script:
    - apt-get update -y
    - apt-get install -y $PHPIZE_DEPS
    - pecl install pcov
    - docker-php-ext-enable pcov
    - php -m | grep -i pcov
  script:
    - php -d pcov.enabled=1 artisan test --env=testing --coverage

  artifacts:
    when: always
    reports:
      junit: storage/test-results/junit.xml
    paths:
      - storage/logs

